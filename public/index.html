<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatting Grounds</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ── AUTH SCREEN ────────────────────────────────────────────────── -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo-mark">CG</div>
      <span>Chatting Grounds</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign in</button>
      <button class="auth-tab" data-tab="register">Create account</button>
    </div>

    <!-- Login -->
    <div class="auth-form" id="loginForm">
      <label>Username<input id="loginUser" type="text" placeholder="Your username" autocomplete="username" /></label>
      <label>Password<input id="loginPass" type="password" placeholder="Your password" autocomplete="current-password" /></label>
      <div class="auth-error" id="loginErr"></div>
      <button class="btn-white full" id="loginBtn">Sign in →</button>
    </div>

    <!-- Register -->
    <div class="auth-form hidden" id="registerForm">
      <label>Username<input id="regUser" type="text" placeholder="Pick a username" autocomplete="username" maxlength="32" /></label>
      <label>Password<input id="regPass" type="password" placeholder="At least 4 characters" autocomplete="new-password" /></label>
      <label>Confirm password<input id="regPass2" type="password" placeholder="Repeat password" autocomplete="new-password" /></label>
      <label>Colour
        <div class="color-row" id="colorRow">
          <div class="dot active" data-c="#ffffff" style="background:#ffffff"></div>
          <div class="dot" data-c="#60a5fa" style="background:#60a5fa"></div>
          <div class="dot" data-c="#34d399" style="background:#34d399"></div>
          <div class="dot" data-c="#f87171" style="background:#f87171"></div>
          <div class="dot" data-c="#a78bfa" style="background:#a78bfa"></div>
          <div class="dot" data-c="#fb923c" style="background:#fb923c"></div>
          <div class="dot" data-c="#f472b6" style="background:#f472b6"></div>
          <div class="dot" data-c="#facc15" style="background:#facc15"></div>
        </div>
      </label>
      <div class="auth-error" id="regErr"></div>
      <button class="btn-white full" id="regBtn">Create account →</button>
    </div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────────── -->
<div id="app" class="app" style="display:none">

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-head">
      <div class="wordmark">CG</div>
      <div class="head-actions">
        <button id="notifBtn" class="s-btn" title="Toggle notifications">🔔</button>
      </div>
    </div>

    <!-- Channels -->
    <div class="nav-section">
      <div class="nav-label-row">
        <span class="nav-label">Channels</span>
        <button class="s-btn add-btn" id="addGroupBtn" title="Create group">＋</button>
      </div>
      <div id="chList" class="nav-list"></div>
    </div>

    <!-- DMs -->
    <div class="nav-section dm-section">
      <div class="nav-label">Direct Messages</div>
      <div id="dmList" class="nav-list"></div>
    </div>

    <!-- Me -->
    <div class="me-strip">
      <div id="meAv" class="me-av">?</div>
      <div class="me-text">
        <div id="meName" class="me-name">—</div>
        <div class="me-sub">● Online</div>
      </div>
      <button id="logoutBtn" class="s-btn" title="Sign out">⎋</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-l">
        <button class="s-btn mob-only" id="mobBtn">☰</button>
        <span id="topbarTitle" class="topbar-title"># general</span>
        <span id="topbarSub" class="topbar-sub"></span>
      </div>
      <div class="topbar-r">
        <button class="s-btn" id="searchToggle">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="9" cy="9" r="6"/><path d="m15 15 3 3"/></svg>
        </button>
        <span id="onlineBadge" class="online-count">0 online</span>
        <button id="deleteChBtn" class="s-btn danger-btn" style="display:none" title="Delete this channel">🗑</button>
      </div>
    </div>

    <div id="searchBar" class="search-bar" style="display:none">
      <input id="searchInput" type="text" placeholder="Search messages…" />
      <button class="s-btn" id="closeSearch">✕</button>
    </div>

    <div id="msgs" class="msgs">
      <div class="ch-welcome">
        <div id="welcomeTitle" class="ch-welcome-title"># general</div>
        <div class="ch-welcome-sub">Start of the conversation</div>
      </div>
      <div id="msgList"></div>
      <div id="typingRow" class="typing-row" style="display:none">
        <span class="typing-dots"><span></span><span></span><span></span></span>
        <span id="typingText"></span>
      </div>
    </div>

    <div id="replyStrip" class="reply-strip" style="display:none">
      <div class="reply-inner">
        <span class="reply-ic">↩</span>
        <span>Replying to <strong id="replyName"></strong> — <em id="replyQuote" class="reply-q"></em></span>
      </div>
      <button class="s-btn" id="cancelReply">✕</button>
    </div>

    <div class="input-area">
      <div class="input-bar" id="inputBar">
        <button class="i-btn" id="attachBtn">📎</button>
        <button class="i-btn" id="imgBtn">🖼</button>
        <button class="i-btn" id="gifBtn">GIF</button>
        <button class="i-btn" id="emojiBtn">☺</button>
        <textarea id="msgInput" rows="1" placeholder="Message…"></textarea>
        <button class="send-btn" id="sendBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
      <input type="file" id="fileInput" multiple style="display:none"/>
      <input type="file" id="imgInput" accept="image/*" multiple style="display:none"/>
    </div>
  </div>
</div>

<!-- Create group modal -->
<div id="groupOverlay" class="overlay" style="display:none">
  <div class="modal sm-modal">
    <div class="modal-head"><span>Create group chat</span><button class="s-btn" id="closeGroup">✕</button></div>
    <div class="modal-body">
      <label>Channel name
        <input id="groupName" type="text" placeholder="e.g. study-group" class="modal-input" maxlength="32" />
        <span class="input-hint">Lowercase letters, numbers, hyphens only</span>
      </label>
      <label>Topic (optional)
        <input id="groupTopic" type="text" placeholder="What's this channel about?" class="modal-input" maxlength="120" />
      </label>
      <div class="auth-error" id="groupErr"></div>
      <button class="btn-white full" id="createGroupBtn">Create channel</button>
    </div>
  </div>
</div>

<!-- GIF modal -->
<div id="gifOverlay" class="overlay" style="display:none">
  <div class="modal gif-modal">
    <div class="modal-head"><span>GIF</span><button class="s-btn" id="closeGif">✕</button></div>
    <input id="gifSearch" type="text" placeholder="Search Giphy…" class="modal-input" style="margin:10px 14px;width:calc(100% - 28px)" />
    <div class="gif-cats" id="gifCats">
      <button class="gcat active" data-q="trending">Trending</button>
      <button class="gcat" data-q="funny">Funny</button>
      <button class="gcat" data-q="reaction">Reaction</button>
      <button class="gcat" data-q="celebrate">Celebrate</button>
      <button class="gcat" data-q="animals">Animals</button>
    </div>
    <div id="gifGrid" class="gif-grid"><div class="loading-spin"></div></div>
  </div>
</div>

<!-- File preview modal -->
<div id="fileOverlay" class="overlay" style="display:none">
  <div class="modal sm-modal">
    <div class="modal-head"><span>Send files</span><button class="s-btn" id="closeFile">✕</button></div>
    <div class="modal-body">
      <div id="filePreviews" class="file-previews"></div>
      <label class="add-more-label"><input type="file" id="addMore" multiple style="display:none"/>＋ Add more</label>
      <input id="fileCaption" type="text" placeholder="Add a caption…" class="modal-input" />
      <div class="modal-btns">
        <button class="btn-ghost" id="cancelFile">Cancel</button>
        <button class="btn-white" id="sendFile">Send <span id="sendCount"></span></button>
      </div>
    </div>
  </div>
</div>

<!-- Emoji picker -->
<div id="emojiPicker" class="emoji-picker" style="display:none">
  <input id="emojiSearch" type="text" placeholder="Search…"/>
  <div id="emojiGrid" class="emoji-grid"></div>
</div>

<!-- Context menu -->
<div id="ctx" class="ctx" style="display:none">
  <button class="ctx-item" data-a="reply">↩  Reply</button>
  <button class="ctx-item" data-a="react">☺  React</button>
  <button class="ctx-item" data-a="copy">⎘  Copy</button>
  <button class="ctx-item danger" data-a="delete">✕  Delete</button>
</div>

<!-- Quick reactions -->
<div id="qr" class="qr" style="display:none">
  <span data-e="👍">👍</span><span data-e="❤">❤</span><span data-e="😂">😂</span>
  <span data-e="😮">😮</span><span data-e="🔥">🔥</span><span data-e="🎉">🎉</span>
  <span data-e="😢">😢</span><span data-e="✅">✅</span>
</div>

<!-- Notification banner -->
<div id="notifBanner" class="notif-banner" style="display:none">
  <span>Enable notifications for new messages?</span>
  <button id="allowNotif" class="btn-white small">Allow</button>
  <button class="s-btn" id="dismissBanner">✕</button>
</div>

<div id="toasts" class="toasts"></div>

<script src="/emoji-data.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
